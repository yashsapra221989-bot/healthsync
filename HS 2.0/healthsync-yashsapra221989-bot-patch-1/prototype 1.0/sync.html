<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealthSync — Medical Profile Setup</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #06080f; --surface: #0d1117; --surface2: #161b27; --surface3: #1e2535;
      --border: #232d42; --accent: #00c8ff; --accent-dim: rgba(0,200,255,0.12);
      --green: #00e5a0; --red: #ff4757; --amber: #ffd32a;
      --text: #e8edf5; --text2: #8892a4; --text3: #4a5568;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); padding: 40px 20px; }
    .grid-bg { position: fixed; inset: 0; background-image: linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
    .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.5rem; text-decoration: none; color: var(--text); position: relative; z-index: 10; display: block; margin-bottom: 40px; text-align: center; }
    .nav-logo span { color: var(--accent); }

    .form-container { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; max-width: 760px; margin: 0 auto; padding: 40px; position: relative; z-index: 1; }
    
    .form-header h2 { font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800; margin-bottom: 8px; }
    .form-header p { font-size: 0.95rem; color: var(--text2); margin-bottom: 30px; }

    .section-title { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; margin: 30px 0 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group.full { grid-column: 1 / -1; }

    label { display: block; font-size: 0.75rem; font-family: 'DM Mono', monospace; text-transform: uppercase; color: var(--text2); margin-bottom: 8px; }
    input, select, textarea { width: 100%; padding: 12px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; transition: all 0.2s; outline: none; }
    input:focus, select:focus, textarea:focus { border-color: var(--accent); background: var(--surface3); }
    textarea { resize: vertical; min-height: 80px; }

    .btn-submit { width: 100%; padding: 16px; background: var(--accent); color: var(--bg); border: none; border-radius: 12px; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem; cursor: pointer; transition: all 0.2s; margin-top: 30px; }
    .btn-submit:hover { background: #33d4ff; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,200,255,0.3); }

    @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-container { padding: 24px; } }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="nav-actions" style="position: absolute; top: 24px; right: 32px; z-index: 100;">
    <button class="nav-btn" style="background: none; border: 1px solid var(--border); color: var(--text2); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; padding: 8px 16px; border-radius: 8px; cursor: pointer; transition: 0.2s;" onclick="signOut()" onmouseover="this.style.borderColor='var(--accent)'; this.style.color='var(--accent)';" onmouseout="this.style.borderColor='var(--border)'; this.style.color='var(--text2)';">Sign Out</button>
  </div>
  <a href="index.html" class="nav-logo">Health<span>Sync</span></a>

  <div class="form-container">
    <div class="form-header">
      <h2>Medical Profile Setup</h2>
      <p>Complete your health record. This exhaustive information will be encoded securely to be read instantly by first responders.</p>
    </div>

    <!-- Identity & Basics -->
    <div class="section-title">01. Demographics & Identity</div>
    <div class="form-grid">
      <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="John Doe"></div>
      <div class="form-group"><label>Date of Birth</label><input type="date" id="dob"></div>
      <div class="form-group">
        <label>Gender</label>
        <select id="gender">
          <option value="">Select Gender</option><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group"><label>ABHA ID (Optional)</label><input type="text" id="abha" placeholder="14-digit API ID..."></div>
    </div>

    <!-- Vitals -->
    <div class="section-title">02. Essential Vitals</div>
    <div class="form-grid">
      <div class="form-group"><label>Blood Group</label><input type="text" id="blood" placeholder="e.g. O+, A-"></div>
      <div class="form-group"><label>Weight (kg)</label><input type="number" id="weight" placeholder="e.g. 70"></div>
      <div class="form-group"><label>Height (cm)</label><input type="number" id="height" placeholder="e.g. 175"></div>
    </div>

    <!-- Medical Details -->
    <div class="section-title">03. Clinical Information</div>
    <div class="form-grid">
      <div class="form-group full"><label>Allergies (comma separated)</label><input type="text" id="allergy" placeholder="Peanuts, Penicillin..."></div>
      <div class="form-group full"><label>Current Medications (comma separated)</label><input type="text" id="meds" placeholder="Lisinopril 10mg, Metformin..."></div>
      <div class="form-group full"><label>Medical Conditions (comma separated)</label><input type="text" id="condition" placeholder="Hypertension, Type 2 Diabetes..."></div>
      <div class="form-group full"><label>Past Surgeries</label><textarea id="surgeries" placeholder="Appendectomy (2015)..."></textarea></div>
    </div>

    <!-- Emergency Contacts -->
    <div class="section-title">04. Emergency Protocols</div>
    <div class="form-grid">
      <div class="form-group"><label>Emergency Contact Name</label><input type="text" id="ecName" placeholder="Jane Doe"></div>
      <div class="form-group"><label>Relationship</label><input type="text" id="ecRel" placeholder="Spouse, Parent..."></div>
      <div class="form-group"><label>Emergency Phone</label><input type="tel" id="ecPhone" placeholder="+91..."></div>
      <div class="form-group"><label>Primary Doctor / Hospital</label><input type="text" id="doctor" placeholder="Dr. Smith, City Hospital"></div>
    </div>

    <button type="button" class="btn-submit" onclick="generateQR()">Generate Emergency QR Card →</button>
  </div>

  <script src="script.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const loggedInId = sessionStorage.getItem('loggedInUser');
      if (!loggedInId) {
         window.location.href = 'login.html?role=patient';
         return;
      }
      
      // Pre-fill form if data already exists
      const patients = getPatients();
      const user = patients.find(p => p.id === loggedInId);
      
      if (user) {
        document.getElementById('name').value = user.name || '';
        document.getElementById('dob').value = user.dob || '';
        document.getElementById('gender').value = user.gender || '';
        document.getElementById('abha').value = user.abha || '';
        document.getElementById('blood').value = user.blood || '';
        document.getElementById('weight').value = user.weight || '';
        document.getElementById('height').value = user.height || '';
        
        document.getElementById('allergy').value = user.allergies ? user.allergies.join(', ') : '';
        document.getElementById('meds').value = user.meds ? user.meds.join(', ') : '';
        document.getElementById('condition').value = user.conditions ? user.conditions.join(', ') : '';
        document.getElementById('surgeries').value = user.surgeries || '';
        
        document.getElementById('ecName').value = user.ecName || '';
        document.getElementById('ecRel').value = user.ecRel || '';
        document.getElementById('ecPhone').value = user.ecPhone || user.phone || '';
        document.getElementById('doctor').value = user.doctor || '';
      }
    });
    
    function signOut() {
      sessionStorage.removeItem('loggedInUser');
      window.location.href = 'login.html?role=patient';
    }

    // We rely on script.js generateQR() -> saves to local, then redirects to qr.html
  </script>
</body>
</html>
