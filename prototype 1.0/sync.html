<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthSync — Medical Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #06080f;
  --surface: #0d1117;
  --surface2: #161b27;
  --surface3: #1e2535;
  --border: #232d42;
  --accent: #00c8ff;
  --accent-dim: rgba(0,200,255,0.12);
  --green: #00e5a0;
  --red: #ff4757;
  --amber: #ffd32a;
  --text: #e8edf5;
  --text2: #8892a4;
  --text3: #4a5568;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Grid bg */
.grid-bg {
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,200,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,200,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999; opacity: 0.4;
}

/* Nav */
nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 40px;
  border-bottom: 1px solid var(--border);
  background: rgba(6,8,15,0.85);
  backdrop-filter: blur(20px);
  position: sticky; top: 0; z-index: 100;
}
.nav-logo {
  font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.3rem;
  letter-spacing: -0.5px; color: var(--text);
}
.nav-logo span { color: var(--accent); }
.nav-actions { display: flex; gap: 10px; align-items: center; }
.nav-btn {
  display: flex; align-items: center; gap: 6px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text2);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  padding: 7px 14px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Page layout */
.medical-form-container {
  max-width: 680px; width: 100%;
  margin: 0 auto;
  padding: 48px 24px;
  position: relative; z-index: 1;
}

/* Header */
.form-header { margin-bottom: 36px; animation: fadeUp 0.5s ease both; }
.form-tag {
  font-family: 'DM Mono', monospace; font-size: 0.72rem;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent); margin-bottom: 12px; display: block;
}
.form-header h2 {
  font-family: 'Syne', sans-serif; font-size: 1.9rem;
  font-weight: 800; letter-spacing: -1px; margin-bottom: 10px;
}
.form-header p { font-size: 0.88rem; color: var(--text2); font-weight: 300; line-height: 1.6; }

/* Progress bar */
.progress-wrap { margin-bottom: 32px; animation: fadeUp 0.5s 0.1s ease both; }
.progress-label {
  display: flex; justify-content: space-between;
  font-family: 'DM Mono', monospace; font-size: 0.65rem;
  letter-spacing: 1px; text-transform: uppercase;
  color: var(--text3); margin-bottom: 8px;
}
.progress-label span { color: var(--accent); }
.progress-track {
  width: 100%; height: 3px; background: var(--surface2);
  border-radius: 2px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  width: 0%;
  transition: width 0.4s ease;
  border-radius: 2px;
}

/* Section divider */
.section-divider {
  display: flex; align-items: center; gap: 12px;
  margin: 28px 0 20px;
}
.section-divider span {
  font-family: 'DM Mono', monospace; font-size: 0.7rem;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent); white-space: nowrap;
}
.section-divider::before, .section-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* Form groups */
.form-group { margin-bottom: 18px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }

label {
  display: block;
  font-size: 0.72rem; font-family: 'DM Mono', monospace;
  letter-spacing: 0.5px; color: var(--text2);
  margin-bottom: 8px; text-transform: uppercase;
}

input[type="text"],
input[type="tel"],
input[type="number"] {
  width: 100%;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px;
  color: var(--text); font-family: 'DM Sans', sans-serif;
  font-size: 0.9rem; transition: all 0.2s; outline: none;
  -webkit-appearance: none;
}
input:focus {
  border-color: var(--accent); background: var(--surface3);
  box-shadow: 0 0 0 3px rgba(0,200,255,0.08);
}
input::placeholder { color: var(--text3); }

/* Field status indicator */
.field-status {
  font-size: 0.7rem; font-family: 'DM Mono', monospace;
  margin-top: 5px; display: none;
}
.field-status.valid { color: var(--green); display: block; }
.field-status.invalid { color: var(--red); display: block; }

/* Submit button */
.btn-submit {
  width: 100%; padding: 14px;
  background: var(--accent); color: var(--bg);
  border: none; border-radius: 12px;
  font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 0.95rem; cursor: pointer; transition: all 0.25s;
  letter-spacing: 0.3px; margin-top: 32px;
  position: relative; overflow: hidden;
}
.btn-submit::after {
  content: '';
  position: absolute; top: 0; left: -100%;
  width: 60%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s;
}
.btn-submit:hover::after { left: 150%; }
.btn-submit:hover { background: #33d4ff; transform: translateY(-2px); box-shadow: 0 10px 30px rgba(0,200,255,0.3); }

/* Dashboard link btn */
.btn-secondary {
  display: inline-flex; align-items: center; gap: 8px;
  width: 100%; padding: 13px;
  background: transparent;  color: var(--text2);
  border: 1px solid var(--border); border-radius: 12px;
  font-family: 'Syne', sans-serif; font-weight: 600;
  font-size: 0.88rem; cursor: pointer; transition: all 0.2s;
  margin-top: 12px; justify-content: center; text-decoration: none;
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

/* Toast */
.toast {
  position: fixed; bottom: 32px; right: 32px;
  background: var(--surface2); border-radius: 12px;
  padding: 12px 20px; font-size: 0.82rem;
  font-family: 'DM Mono', monospace; z-index: 9998;
  transform: translateY(80px); opacity: 0;
  transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  display: flex; align-items: center; gap: 8px;
}
.toast.success { border: 1px solid var(--green); color: var(--green); }
.toast.error   { border: 1px solid var(--red);   color: var(--red); }
.toast.info    { border: 1px solid var(--accent); color: var(--accent); }
.toast.warning { border: 1px solid var(--amber);  color: var(--amber); }
.toast.show    { transform: translateY(0); opacity: 1; }

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 600px) {
  .form-row { grid-template-columns: 1fr; }
  nav { padding: 14px 20px; }
  .medical-form-container { padding: 32px 20px; }
}
</style>
</head>
<body>
<div class="grid-bg"></div>

<!-- Nav -->
<nav>
  <div class="nav-logo">Health<span>Sync</span></div>
  <div class="nav-actions">
    <a href="dashboard.html" class="nav-btn">📊 Dashboard</a>
    <button class="nav-btn" onclick="if(confirm('Sign out?'))window.location.href='login.html'">Sign Out</button>
  </div>
</nav>

<div class="medical-form-container">

  <div class="form-header">
    <span class="form-tag">Emergency QR Card</span>
    <h2>Medical Profile</h2>
    <p>Fill in your information below. This data will be encoded into your emergency QR card — accessible by first responders instantly, no app required.</p>
  </div>

  <!-- Progress bar -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>PROFILE COMPLETENESS</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressBar"></div>
    </div>
  </div>

  <form id="medicalForm">

    <div class="section-divider"><span>Identity</span></div>

    <div class="form-group">
      <label for="name">Full Name <span style="color:var(--red)">*</span></label>
      <input type="text" id="name" placeholder="Arjun Sharma" required>
      <div class="field-status" id="nameStatus"></div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="blood">Blood Group</label>
        <input type="text" id="blood" placeholder="e.g. O+, A-, AB+">
        <div class="field-status" id="bloodStatus"></div>
      </div>
      <div class="form-group">
        <label for="contact">Emergency Contact</label>
        <input type="tel" id="contact" placeholder="Name & phone number">
        <div class="field-status" id="contactStatus"></div>
      </div>
    </div>

    <div class="section-divider"><span>Medical Info</span></div>

    <div class="form-group">
      <label for="allergy">Allergies</label>
      <input type="text" id="allergy" placeholder="e.g. Penicillin, Peanuts, Latex">
      <div class="field-status" id="allergyStatus"></div>
    </div>

    <div class="form-group">
      <label for="condition">Medical Conditions</label>
      <input type="text" id="condition" placeholder="e.g. Diabetes, Hypertension, Asthma">
      <div class="field-status" id="conditionStatus"></div>
    </div>

    <button type="button" id="generateBtn" class="btn-submit" onclick="generateQR()">
      Generate Emergency QR Card →
    </button>

    <a href="dashboard.html" class="btn-secondary">📊 View Dashboard</a>

  </form>

</div>

<!-- Toast container -->
<div class="toast" id="toastEl"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
/* ── Override showToast to use the new toast style ── */
function showToast(message, type = 'info') {
  const el = document.getElementById('toastEl');
  el.textContent = message;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3200);
}

/* ── Progress update ── */
function updateProgressBar() {
  const fields = ['name','blood','allergy','condition','contact'];
  const weights = { name: 30, blood: 20, allergy: 20, condition: 15, contact: 15 };
  let progress = 0;
  fields.forEach(id => {
    if (document.getElementById(id) && document.getElementById(id).value.trim()) {
      progress += (weights[id] || 0);
    }
  });
  document.getElementById('progressBar').style.width = progress + '%';
  document.getElementById('progressPct').textContent = progress + '%';
}

/* ── User ID management (same logic as script.js) ── */
let userId = null;

function initializeUserId() {
  userId = localStorage.getItem('userId');
  if (!userId) {
    userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('userId', userId);
  }
}

/* ── Field validation ── */
function validateField(input) {
  const value = input.value.trim();
  const statusEl = document.getElementById(input.id + 'Status');
  if (!statusEl) return;
  if (value.length > 0) {
    statusEl.textContent = '✓ Complete';
    statusEl.className = 'field-status valid';
  } else {
    statusEl.textContent = '';
    statusEl.className = 'field-status';
  }
}

function setupInputValidation() {
  document.querySelectorAll('input').forEach(input => {
    input.addEventListener('input', function() {
      updateProgressBar();
      validateField(this);
    });
  });
}

function loadSavedData() {
  const savedData = localStorage.getItem('medicalData');
  if (savedData) {
    const data = JSON.parse(savedData);
    const map = { name:'name', blood:'blood', allergy:'allergy', condition:'condition', contact:'contact' };
    Object.entries(map).forEach(([key, id]) => {
      const el = document.getElementById(id);
      if (el && data[key]) el.value = data[key];
    });
    updateProgressBar();
  }
  document.querySelectorAll('input').forEach(inp => validateField(inp));
}

async function saveMedicalDataToServer() {
  try {
    const medicalData = {
      id:        userId,
      name:      document.getElementById('name').value.trim(),
      blood:     document.getElementById('blood').value.trim(),
      allergy:   document.getElementById('allergy').value.trim(),
      condition: document.getElementById('condition').value.trim(),
      contact:   document.getElementById('contact').value.trim()
    };
    const response = await fetch('/api/save-medical-data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(medicalData)
    });
    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const result = await response.json();
    if (result.success) {
      localStorage.setItem('userId', result.user_id);
      userId = result.user_id;
      showToast('Data saved to database ✓', 'success');
      return true;
    }
    showToast('Warning: DB save failed, continuing…', 'warning');
    return false;
  } catch (err) {
    showToast('Warning: Database save failed, continuing…', 'warning');
    return false;
  }
}

async function generateQR() {
  const name = document.getElementById('name').value.trim();
  if (!name) {
    showToast('Please enter your name first!', 'error');
    document.getElementById('name').focus();
    return;
  }
  const medicalData = {
    name,
    blood:     document.getElementById('blood').value.trim(),
    allergy:   document.getElementById('allergy').value.trim(),
    condition: document.getElementById('condition').value.trim(),
    contact:   document.getElementById('contact').value.trim(),
    timestamp: Date.now()
  };
  localStorage.setItem('medicalData', JSON.stringify(medicalData));
  await saveMedicalDataToServer();
  window.location.href = 'qr.html';
}

/* ── Init ── */
window.addEventListener('DOMContentLoaded', function() {
  initializeUserId();
  setupInputValidation();
  loadSavedData();
});
</script>
</body>
</html>
